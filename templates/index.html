<!DOCTYPE html>
<html>
<head>
<title>M3U8 Converter</title>
</head>

<body>

<h2>M3U8 → MP4 Converter</h2>

<input id="url" size="70" placeholder="Paste m3u8 URL">
<button onclick="start()">Convert</button>

<p id="status"></p>

<script>

async function start(){

let url=document.getElementById("url").value

let r=await fetch("/convert",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url})
})

let data=await r.json()

track(data.task_id)

}

async function track(id){

while(true){

let r=await fetch("/progress/"+id)
let d=await r.json()

document.getElementById("status").innerText=
"Status: "+d.status+" | "+d.progress+"%"

if(d.status=="done"){

document.getElementById("status").innerHTML=
`Done → <a href="/download/${id}">Download MP4</a>`

break
}

if(d.status=="error"){

document.getElementById("status").innerText=
"Error: "+d.error

break
}

await new Promise(r=>setTimeout(r,2000))

}

}

</script>

</body>
</html>
